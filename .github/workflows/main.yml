name: DevSecOps Pipeline - App Project

on:
  push:
    branches: [ master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

# ================= TEST =================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --prefix ./app

      - name: Run tests
        run: npm test --prefix ./app


# ================= BUILD & SECURITY =================
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Dependency Scan (SAST basic)
      - name: NPM Audit
        run: npm audit --prefix ./app || true

      # 🔐 SonarQube Scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          projectBaseDir: ./app
          args: >
            -Dsonar.projectKey=my-devsecops-project
            -Dsonar.organization=aijazkhan123
            -Dsonar.sources=.
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # 🐳 Dock
      # ================= DOCKER BUILD =================
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t $DOCKER_IMAGE:${{ github.sha }} ./app
          docker tag $DOCKER_IMAGE:${{ github.sha }} $DOCKER_IMAGE:latest

      # ================= TRIVY SCAN =================
      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: 0

      # ================= PUSH IMAGE =================
      - name: Push Docker image
        run: |
          docker tag $DOCKER_IMAGE:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/$DOCKER_IMAGE:${{ github.sha }}
          docker tag $DOCKER_IMAGE:latest ${{ secrets.DOCKER_USERNAME }}/$DOCKER_IMAGE:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/$DOCKER_IMAGE:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/$DOCKER_IMAGE:latest
er Login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 Build Image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devsecops-app:${{ github.sha }} ./app
          docker tag ${{ secrets.DOCKER_USERNAME }}/devsecops-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

      # 🔐 Image Scan (Trivy)
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/devsecops-app:${{ github.sha }}
          format: table
          exit-code: 0

      # 🐳 Push Image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest


# ================= DEPLOY =================
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ☸️ Create Kind Cluster
      - name: Setup Kind Cluster
        uses: helm/kind-action@v1

      # ☸️ Install kubectl
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # 🌐 Install Ingress Controller (NGINX)
      - name: Install NGINX Ingress
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s

      # 📊 Install Metrics Server (required for HPA)
      - name: Install Metrics Server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

      # ⏳ Wait cluster ready
      - name: Wait for cluster
        run: kubectl get nodes

      # 🚀 Deploy everything
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          # kubectl apply -f k8s/ingress.yaml

      # ✅ Verify
      - name: Verify Deployment
        run: |
          kubectl get pods -n production
          kubectl get svc -n production
          kubectl get ingress -n production
          kubectl get hpa -n production
